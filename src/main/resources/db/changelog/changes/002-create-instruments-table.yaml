databaseChangeLog:
  - changeSet:
      id: 002-create-instruments-table
      author: Prost3333
      changes:
        - createTable:
            tableName: instruments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: ticker
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false

              - column:
                  name: exchange_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_instrument_exchange
                    references: exchanges(id)