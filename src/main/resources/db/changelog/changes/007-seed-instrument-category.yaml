databaseChangeLog:
  - changeSet:
      id: 007-seed-instrument-category
      author: Prost3333
      changes:
        - sql:
            sql: |
              -- all seeded instruments are stocks -> Share
              INSERT INTO instrument_category (instrument_id, category_id)
              SELECT i.id, c.id
              FROM instruments i
              JOIN categories c ON c.name = 'Share'
              ON CONFLICT DO NOTHING;
